{% extends "form_base.html" %}
{% block page_title %}Contrat CDD{% endblock %}
{% block heading %}Générer un contrat CDD{% endblock %}
{% block action %}/generate/cdd{% endblock %}
{% block fields %}
    <div class="row">
        <div><label>Nom du salarié</label><input name="nom" required></div>
        <div><label>Poste</label><input name="poste" required></div>
    </div>
    <label>Nom de l'entreprise</label>
    <input name="entreprise" required>
    <label>Adresse de l'entreprise</label>
    <input name="adresse" required>
    <label>Motif du recours au CDD</label>
    <input name="motif" placeholder="Ex : remplacement, accroissement d'activité..." required>
    <div class="row">
        <div><label>Date de début</label><input name="date_debut" type="date" required></div>
        <div><label>Date de fin</label><input name="date_fin" type="date"></div>
    </div>
    <div class="row">
        <div><label>Durée (ex : 6 mois)</label><input name="duree" required></div>
        <div><label>Salaire brut mensuel (€)</label><input name="salaire" required></div>
    </div>
    <div class="row">
        <div><label>Période d'essai (ex : 2 semaines)</label><input name="periode_essai"></div>
        <div><label>Renouvelable ?</label>
            <select name="renouvelable">
                <option value="Oui">Oui</option>
                <option value="Non" selected>Non</option>
            </select>
        </div>
    </div>
{% endblock %}
