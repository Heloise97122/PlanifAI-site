{% extends "form_base.html" %}
{% block page_title %}Convention de stage{% endblock %}
{% block heading %}Générer une convention de stage{% endblock %}
{% block action %}/generate/stage{% endblock %}
{% block fields %}
    <div class="row">
        <div><label>Nom du stagiaire</label><input name="nom" required></div>
        <div><label>Établissement d'enseignement</label><input name="ecole" required></div>
    </div>
    <label>Nom de l'entreprise d'accueil</label>
    <input name="entreprise" required>
    <label>Adresse de l'entreprise</label>
    <input name="adresse" required>
    <label>Missions confiées</label>
    <textarea name="missions" rows="3" required></textarea>
    <div class="row">
        <div><label>Tuteur en entreprise</label><input name="tuteur" required></div>
        <div><label>Gratification mensuelle (€)</label><input name="gratification" placeholder="0 si non gratifié"></div>
    </div>
    <div class="row">
        <div><label>Date de début</label><input name="date_debut" type="date" required></div>
        <div><label>Date de fin</label><input name="date_fin" type="date"></div>
    </div>
    <label>Durée (ex : 3 mois)</label>
    <input name="duree" required>
{% endblock %}
