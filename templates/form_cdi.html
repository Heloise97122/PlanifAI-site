{% extends "form_base.html" %}
{% block page_title %}Contrat CDI{% endblock %}
{% block heading %}Générer un contrat CDI{% endblock %}
{% block action %}/generate/cdi{% endblock %}
{% block fields %}
    <div class="row">
        <div><label>Nom du salarié</label><input name="nom" required></div>
        <div><label>Poste</label><input name="poste" required></div>
    </div>
    <label>Nom de l'entreprise</label>
    <input name="entreprise" required>
    <label>Adresse de l'entreprise</label>
    <input name="adresse" required>
    <div class="row">
        <div><label>Date de début</label><input name="date_debut" type="date" required></div>
        <div><label>Salaire brut mensuel (€)</label><input name="salaire" required></div>
    </div>
    <div class="row">
        <div><label>Période d'essai (ex : 2 mois)</label><input name="periode_essai"></div>
        <div><label>Renouvelable ?</label>
            <select name="renouvelable">
                <option value="Oui">Oui</option>
                <option value="Non" selected>Non</option>
            </select>
        </div>
    </div>
    <label>URL du logo (optionnel)</label>
    <input name="logo_url" placeholder="https://...">
{% endblock %}
