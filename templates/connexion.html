<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanifAI | Connexion</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body class="auth">
    <div class="auth-card">
        <span class="brand">Planif<span class="dot">·</span>AI <small>Atelier</small></span>
        <h1>Connexion</h1>
        <p class="sub">Accédez à votre espace.</p>

        {% if erreur %}<div class="form-error">{{ erreur }}</div>{% endif %}

        <form method="post" action="/connexion">
            <label>Email</label>
            <input name="email" type="email" placeholder="vous@entreprise.fr" required>
            <label>Mot de passe</label>
            <input name="mot_de_passe" type="password" required>
            <button type="submit">Se connecter</button>
        </form>

        <p class="auth-alt"><a href="/mot-de-passe-oublie">Mot de passe oublié ?</a></p>
        <p class="auth-alt">Pas encore de compte ? <a href="/inscription">Créer un compte</a></p>
    </div>
</body>
</html>
