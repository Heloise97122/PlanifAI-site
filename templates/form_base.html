<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanifAI | {% block page_title %}Formulaire{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <p><a href="/">&larr; Retour au tableau de bord</a></p>
    <h1>{% block heading %}Formulaire{% endblock %}</h1>
    <p>{% block intro %}Renseignez les informations puis générez le PDF.{% endblock %}</p>
    <p class="hint">Les champs marqués « (optionnel) » peuvent être laissés vides.</p>

    <form method="post" action="{% block action %}/{% endblock %}">
        {% block fields %}{% endblock %}
        <button type="submit">Générer le PDF</button>
    </form>

    <div id="loader" class="loader" role="status">⏳ Génération du PDF en cours…</div>

    <script>
    // Amélioration progressive : sans JS, le formulaire télécharge le PDF normalement.
    (function () {
        var form = document.querySelector('form');
        var loader = document.getElementById('loader');
        var btn = form.querySelector('button[type="submit"]');
        if (!form || !window.fetch) return;

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            btn.disabled = true;
            loader.style.display = 'block';
            try {
                var res = await fetch(form.action, { method: 'POST', body: new FormData(form) });
                if (!res.ok) {
                    // Affiche la page d'erreur claire renvoyée par le serveur.
                    var html = await res.text();
                    document.open(); document.write(html); document.close();
                    return;
                }
                var blob = await res.blob();
                var cd = res.headers.get('Content-Disposition') || '';
                var m = cd.match(/filename="?([^"]+)"?/);
                var name = m ? m[1] : 'document.pdf';
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url; a.download = name;
                document.body.appendChild(a); a.click(); a.remove();
                URL.revokeObjectURL(url);
            } catch (ex) {
                // En cas de souci réseau, on soumet le formulaire de façon classique.
                form.submit();
                return;
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    })();
    </script>
</body>
</html>
